# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Codecov

run-name: Codecov • ${{ github.ref_name }} @${{ github.actor }}

concurrency:
    group: codecov-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
    workflow_dispatch:

jobs:
    coverage:
        name: Run Coverage And Upload (${{ matrix.label }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 20
        permissions:
            contents: read
        strategy:
            fail-fast: true
            matrix:
                include:
                    - label: linux
                      os: ubuntu-latest
                      codecov_flag: os-linux
                    - label: windows
                      os: windows-latest
                      codecov_flag: os-windows
                    - label: macos
                      os: macos-latest
                      codecov_flag: os-macos
        defaults:
            run:
                shell: bash

        steps:
            - name: Harden the runner (Audit all outbound calls)
              if: ${{ matrix.os == 'ubuntu-latest' }}
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 2

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci --force

            - name: Build package
              run: npm run build

            - name: Run tests with coverage and emit JUnit report
              run: npx vitest run --coverage --reporter=github-actions --reporter=dot --reporter=junit --outputFile=test-report.junit.xml --silent
              env:
                  CI: "true"
                  MAX_THREADS: "1"
                  STYLELINT2_VITEST_HANGING_PROCESS_REPORTER: "true"
                  VITEST_HANGING_PROCESS_REPORTER: "true"

            - name: Verify coverage artifact
              run: python -c "from pathlib import Path; assert Path('coverage/lcov.info').is_file(), 'coverage/lcov.info was not generated'"

            - name: Verify JUnit artifact
              run: python -c "from pathlib import Path; assert Path('test-report.junit.xml').is_file(), 'test-report.junit.xml was not generated'"

            - name: Upload test results to Codecov
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  slug: Nick2bad4u/eslint-plugin-stylelint-2
                  files: test-report.junit.xml
                  flags: unit
                  name: vitest-junit-${{ matrix.codecov_flag }}
                  report_type: test_results
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  slug: Nick2bad4u/eslint-plugin-stylelint-2
                  files: ./coverage/lcov.info
                  flags: unit
                  name: vitest-unit-coverage-${{ matrix.codecov_flag }}
                  report_type: coverage
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true
